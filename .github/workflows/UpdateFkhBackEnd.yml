# ============================================================================
# Update Fkh Backend – Publish function code only (reusable workflow)
# ============================================================================
# Called from a private deployment repo via workflow_call.
# Use this when backend code changes but infrastructure is unchanged.
# The deployment repo provides the tfvars file (config/deployment.tfvars);
# this workflow checks out the Fkh fork for Terraform state and backend code.
#
# ── Deployment identity (OIDC, passwordless) ───────────────────────────────
#   Uses the same identity as the Deploy workflow (App Registration or
#   Managed Identity). See docs/AzureSetup-PathA.md for setup options.
#   Federated credential config:
#     - Issuer:   https://token.actions.githubusercontent.com
#     - Subject:  repo:<org>/<deployment-repo>:ref:refs/heads/main
#     - Audience: api://AzureADTokenExchange
#   Minimum role assignment:
#     • Contributor on the Function App resource group
#
# ── Inputs ──────────────────────────────────────────────────────────────────
#   fkh-repo   - Owner/name of the Fkh fork (default: Freddy-DK/Fkh)
#   fkh-ref    - Git ref to checkout from the Fkh fork (default: main)
#
# ── Secrets (passed by the caller workflow) ─────────────────────────────────
#   (none — azure_deploy_client_id, tenant_id and subscription_id are read from config/deployment.tfvars)
# ============================================================================

name: Update Fkh Backend

on:
  workflow_call:
    inputs:
      fkh-repo:
        description: 'Owner/name of the Fkh fork (e.g. Freddy-DK/Fkh)'
        required: false
        type: string
        default: 'Freddy-DK/Fkh'
      fkh-ref:
        description: 'Git ref to checkout from the Fkh fork (e.g. main, a branch name, a tag or a commit SHA)'
        required: false
        type: string
        default: 'main'
      staging:
        description: 'Deploy to the staging Function App instead of production'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true

jobs:
  deployFkhBackend:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout deployment repo (for tfvars)
        uses: actions/checkout@v6
        with:
          path: deployment

      - name: Checkout Fkh fork (for terraform + backend code)
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.fkh-repo }}
          ref: ${{ inputs.fkh-ref }}
          path: fkh

      # ── Compute fork status ───────────────────────────────────────────────
      - name: Compute fork status
        if: inputs.fkh-repo != 'Freddy-DK/Fkh'
        id: fork
        shell: bash
        working-directory: fkh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OWNER="${{ inputs.fkh-repo }}"
          OWNER="${OWNER%%/*}"
          if RESPONSE=$(gh api "repos/Freddy-DK/Fkh/compare/main...${OWNER}:${{ inputs.fkh-ref }}" 2>/dev/null); then
            echo "ahead=$(echo "$RESPONSE" | jq -r '.ahead_by')" >> $GITHUB_OUTPUT
            echo "behind=$(echo "$RESPONSE" | jq -r '.behind_by')" >> $GITHUB_OUTPUT
            echo "merge_base_sha=$(echo "$RESPONSE" | jq -r '.merge_base_commit.sha')" >> $GITHUB_OUTPUT
            echo "merge_base_date=$(echo "$RESPONSE" | jq -r '.merge_base_commit.commit.committer.date')" >> $GITHUB_OUTPUT
          else
            echo "::warning::Could not determine fork status — GitHub API call failed"
          fi

      # ── Resolve tfvars ────────────────────────────────────────────────────
      - name: Resolve tfvars file
        id: tfvars
        shell: pwsh
        working-directory: fkh/terraform
        run: |
          $tfvarsFile = "../../deployment/config/deployment.tfvars"
          if (-not (Test-Path $tfvarsFile)) {
            throw "tfvars file not found at config/deployment.tfvars in the deployment repo."
          }
          "tfvars_file=$tfvarsFile" >> $env:GITHUB_OUTPUT

      # ── Parse tfvars ──────────────────────────────────────────────────────
      - name: Parse tfvars
        id: parse
        shell: pwsh
        working-directory: fkh/terraform
        run: |
          $varFile = "${{ steps.tfvars.outputs.tfvars_file }}"
          function Get-TfVar([string]$Name, [string]$File) {
            $line = Get-Content $File | Where-Object { $_ -match "^\s*$Name\s*=" } | Select-Object -First 1
            if ($line -match '=\s*"([^"]+)"') { return $Matches[1] }
            throw "Could not find $Name in $File"
          }

          $subscriptionId = Get-TfVar "subscription_id" $varFile
          $tenantId       = Get-TfVar "tenant_id" $varFile
          $deployClientId = Get-TfVar "azure_deploy_client_id" $varFile
          $deploymentName = Get-TfVar "fkhDeploymentName" $varFile
          try { $githubAppClientId = Get-TfVar "github_app_client_id" $varFile } catch { $githubAppClientId = "" }

          $resourceGroupName = "fkh-$deploymentName"
          $functionAppName   = "fkh-$deploymentName-backend"
          $stagingAppName    = "fkh-$deploymentName-backend-staging"
          $webAppName        = "fkh-$deploymentName-web"

          "subscription_id=$subscriptionId"         >> $env:GITHUB_OUTPUT
          "tenant_id=$tenantId"                     >> $env:GITHUB_OUTPUT
          "deploy_client_id=$deployClientId"        >> $env:GITHUB_OUTPUT
          "deployment_name=$deploymentName"         >> $env:GITHUB_OUTPUT
          "resource_group_name=$resourceGroupName"  >> $env:GITHUB_OUTPUT
          "function_app_name=$functionAppName"      >> $env:GITHUB_OUTPUT
          "staging_function_app_name=$stagingAppName" >> $env:GITHUB_OUTPUT
          "web_app_name=$webAppName"                >> $env:GITHUB_OUTPUT
          "github_app_client_id=$githubAppClientId" >> $env:GITHUB_OUTPUT

          # Set ARM env vars for Terraform OIDC (used by all subsequent steps)
          "ARM_CLIENT_ID=$deployClientId"       >> $env:GITHUB_ENV
          "ARM_TENANT_ID=$tenantId"             >> $env:GITHUB_ENV
          "ARM_SUBSCRIPTION_ID=$subscriptionId" >> $env:GITHUB_ENV

      # ── Tool setup ────────────────────────────────────────────────────────
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Azure CLI login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ steps.parse.outputs.deploy_client_id }}
          tenant-id: ${{ steps.parse.outputs.tenant_id }}
          subscription-id: ${{ steps.parse.outputs.subscription_id }}

      # ── Stamp version into AKS ───────────────────────────────────────────
      - name: Set fkh-version ConfigMap
        run: |
          AKS_RG="${{ steps.parse.outputs.resource_group_name }}"
          AKS_NAME="fkh-${{ steps.parse.outputs.deployment_name }}-aks"
          az aks get-credentials --resource-group "$AKS_RG" --name "$AKS_NAME" --overwrite-existing
          kubectl create namespace app --dry-run=client -o yaml | kubectl apply -f -
          kubectl create configmap fkh-version \
            --namespace app \
            --from-literal=version="${{ inputs.fkh-ref }}" \
            --from-literal=deployed-at="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --from-literal=deployment-repo="${{ github.repository }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── Publish function code ─────────────────────────────────────────────
      - name: Publish Azure Function
        shell: pwsh
        working-directory: fkh/fkh-backend
        run: |
          $staging = "${{ inputs.staging }}" -eq "true"
          $functionAppName   = if ($staging) { "${{ steps.parse.outputs.staging_function_app_name }}" } else { "${{ steps.parse.outputs.function_app_name }}" }
          $resourceGroupName = "${{ steps.parse.outputs.resource_group_name }}"

          Write-Host "Publishing to $functionAppName in $resourceGroupName..."

          func azure functionapp publish $functionAppName --dotnet-isolated
          if ($LASTEXITCODE -ne 0) {
            Write-Host "func publish exited with code $LASTEXITCODE — restarting function app..." -ForegroundColor Yellow
            az functionapp restart --name $functionAppName --resource-group $resourceGroupName
            if ($LASTEXITCODE -ne 0) { throw "func publish and fallback restart both failed." }
            Write-Host "Function app restarted successfully." -ForegroundColor Green
            throw "func publish failed (build errors). Function app was restarted but new code was NOT deployed."
          }

          Write-Host "Function app $functionAppName published successfully." -ForegroundColor Green

      # ── Stamp version into app settings ───────────────────────────────────
      - name: Set FKH_VERSION app setting
        shell: pwsh
        run: |
          $staging = "${{ inputs.staging }}" -eq "true"
          $functionAppName   = if ($staging) { "${{ steps.parse.outputs.staging_function_app_name }}" } else { "${{ steps.parse.outputs.function_app_name }}" }
          $resourceGroupName = "${{ steps.parse.outputs.resource_group_name }}"
          $version = "${{ inputs.fkh-ref }}"

          $deploymentRepo = "${{ github.repository }}"
          $deployedAt = (Get-Date -AsUTC -Format 'o')
          $settings = @(
            "FKH_VERSION=$version"
            "DEPLOYMENT_REPO=$deploymentRepo"
            "DEPLOYED_AT=$deployedAt"
            "FKH_FORK=${{ inputs.fkh-repo }}"
          )
          $forkAhead = "${{ steps.fork.outputs.ahead }}"
          if ($forkAhead) {
            $settings += "FKH_FORK_AHEAD=$forkAhead"
            $settings += "FKH_FORK_BEHIND=${{ steps.fork.outputs.behind }}"
            $settings += "FKH_FORK_MERGE_BASE_SHA=${{ steps.fork.outputs.merge_base_sha }}"
            $settings += "FKH_FORK_MERGE_BASE_DATE=${{ steps.fork.outputs.merge_base_date }}"
          }
          Write-Host "Setting app settings on $functionAppName..."
          az functionapp config appsettings set `
            --name $functionAppName `
            --resource-group $resourceGroupName `
            --settings @settings `
            --output none

      # ── Also publish to staging (when deploying to production and staging exists) ──
      - name: Publish to staging
        if: inputs.staging != true
        shell: pwsh
        working-directory: fkh/fkh-backend
        run: |
          $stagingAppName    = "${{ steps.parse.outputs.staging_function_app_name }}"
          $resourceGroupName = "${{ steps.parse.outputs.resource_group_name }}"

          # Check if staging app actually exists
          $exists = az functionapp show --name $stagingAppName --resource-group $resourceGroupName 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Staging backend not deployed — skipping." -ForegroundColor Yellow
            exit 0
          }

          Write-Host "Also publishing to staging: $stagingAppName..."

          func azure functionapp publish $stagingAppName --dotnet-isolated
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Staging publish failed (exit code $LASTEXITCODE) — production was deployed successfully." -ForegroundColor Yellow
            az functionapp restart --name $stagingAppName --resource-group $resourceGroupName
          }

          Write-Host "Staging function app $stagingAppName published successfully." -ForegroundColor Green

          # Stamp version on staging too
          $version = "${{ inputs.fkh-ref }}"
          $deploymentRepo = "${{ github.repository }}"
          $deployedAt = (Get-Date -AsUTC -Format 'o')
          $settings = @(
            "FKH_VERSION=$version"
            "DEPLOYMENT_REPO=$deploymentRepo"
            "DEPLOYED_AT=$deployedAt"
            "FKH_FORK=${{ inputs.fkh-repo }}"
          )
          $forkAhead = "${{ steps.fork.outputs.ahead }}"
          if ($forkAhead) {
            $settings += "FKH_FORK_AHEAD=$forkAhead"
            $settings += "FKH_FORK_BEHIND=${{ steps.fork.outputs.behind }}"
            $settings += "FKH_FORK_MERGE_BASE_SHA=${{ steps.fork.outputs.merge_base_sha }}"
            $settings += "FKH_FORK_MERGE_BASE_DATE=${{ steps.fork.outputs.merge_base_date }}"
          }
          az functionapp config appsettings set `
            --name $stagingAppName `
            --resource-group $resourceGroupName `
            --settings @settings `
            --output none

      # ── Build and deploy web app ───────────────────────────────────────
      - name: Build and deploy web app
        if: inputs.staging != true
        shell: pwsh
        working-directory: fkh/fkh-web
        env:
          VITE_GITHUB_CLIENT_ID: ${{ steps.parse.outputs.github_app_client_id }}
          VITE_BACKEND_URL: https://fkh-${{ steps.parse.outputs.deployment_name }}-backend.azurewebsites.net/api
        run: |
          $webAppName        = "${{ steps.parse.outputs.web_app_name }}"
          $resourceGroupName = "${{ steps.parse.outputs.resource_group_name }}"

          # Get deployment token via az CLI (skips if web app doesn't exist)
          $secretsJson = az staticwebapp secrets list --name $webAppName --resource-group $resourceGroupName 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Web app not deployed — skipping." -ForegroundColor Yellow
            exit 0
          }
          $deployToken = ($secretsJson | ConvertFrom-Json).properties.apiKey

          npm ci
          npm run build
          npx @azure/static-web-apps-cli deploy ./dist --deployment-token $deployToken --env production
          Write-Host "Web app deployed successfully." -ForegroundColor Green
