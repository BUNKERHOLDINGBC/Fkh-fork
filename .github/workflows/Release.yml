# ============================================================================
# Release – Create a versioned release of Fkh
# ============================================================================
# Trigger from any branch via the GitHub UI branch picker.
# The selected branch becomes the `ref` passed to the implementation workflow.
# All build/publish steps run from that ref.
#
# Deployment repos can reference release tags as the fkh-ref input.
# ============================================================================

name: Release

on:
  workflow_dispatch:
    inputs:
      beta:
        description: 'Beta release'
        required: true
        type: boolean
        default: true

jobs:
  release:
    uses: ./.github/workflows/_release-impl.yml
    with:
      beta: ${{ inputs.beta }}
      ref: ${{ github.ref_name }}
    secrets: inherit
