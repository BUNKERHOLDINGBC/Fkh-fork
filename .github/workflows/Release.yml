# ============================================================================
# Release – Create a versioned release of Fkh
# ============================================================================
# Creates a GitHub release with auto-generated notes from merged PRs.
#
# Run from main:
#   - Version = vYYYY.MM.DD (today's date)
#   - Creates release branch releases/vYYYY.MM.DD (fails if it already exists)
#   - Beta checked → tag vYYYY.MM.DD-beta.1
#   - Beta unchecked → tag vYYYY.MM.DD (stable)
#
# Run from a release branch (releases/vYYYY.MM.DD):
#   - Version from branch name
#   - Beta checked → increments beta number (finds latest -beta.X tag, creates -beta.(X+1))
#   - Beta unchecked → final stable release vYYYY.MM.DD (updates existing release if tag exists)
#
# Tag behavior:
#   - latest tag: updated on stable release from main or the latest release branch
#   - preview tag: updated on beta release from main or the latest release branch
#
# Deployment repos can reference these tags as the fkh-ref input.
# ============================================================================

name: Release

on:
  workflow_dispatch:
    inputs:
      beta:
        description: 'Beta release'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version and create branch
        id: meta
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $isBeta = [bool]::Parse("${{ inputs.beta }}")
          $branch = "${{ github.ref_name }}"
          $fromMain = $branch -eq 'main'

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ($fromMain) {
            # Version from today's date
            $version = Get-Date -Format 'yyyy.MM.dd'
            $releaseBranch = "releases/v$version"

            # Fail early if branch already exists
            $branchExists = git ls-remote --heads origin "refs/heads/$releaseBranch" 2>$null
            if ($branchExists) {
              Write-Error "Release branch '$releaseBranch' already exists. Run the workflow from that branch to create additional releases."
              exit 1
            }

            # Create release branch
            git checkout -b $releaseBranch
            git push origin $releaseBranch
            Write-Host "Created release branch: $releaseBranch"

            if ($isBeta) {
              $tagName = "v$version-beta.1"
            } else {
              $tagName = "v$version"
            }
          } else {
            # Running from a release branch
            if ($branch -notmatch '^releases/v(\d{4}\.\d{2}\.\d{2})$') {
              Write-Error "Branch '$branch' is not a valid release branch. Expected format: releases/vYYYY.MM.DD"
              exit 1
            }
            $version = $Matches[1]

            if ($isBeta) {
              # Find the highest existing beta tag for this version
              $existingBetaTags = git tag -l "v$version-beta.*" | ForEach-Object {
                if ($_ -match '-beta\.(\d+)$') { [int]$Matches[1] }
              } | Sort-Object -Descending
              $nextBeta = if ($existingBetaTags) { $existingBetaTags[0] + 1 } else { 1 }
              $tagName = "v$version-beta.$nextBeta"
            } else {
              $tagName = "v$version"
            }
          }

          # Determine if this is the latest release branch (highest date)
          $allReleaseBranches = git branch -r --list 'origin/releases/v*' | ForEach-Object {
            $_.Trim() -replace '^origin/', ''
          } | Sort-Object -Descending
          $latestReleaseBranch = $allReleaseBranches | Select-Object -First 1

          $currentReleaseBranch = if ($fromMain) { "releases/v$version" } else { $branch }
          $isLatest = ($currentReleaseBranch -eq $latestReleaseBranch) -or $fromMain

          # Check if tag already exists (for updating existing release)
          $tagExists = git tag -l $tagName
          $updateExisting = [bool]$tagExists -and (-not $isBeta)

          "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "is_beta=$($isBeta.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "is_latest=$($isLatest.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "update_existing=$($updateExisting.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          Write-Host "Version: $version"
          Write-Host "Tag: $tagName"
          Write-Host "Beta: $isBeta"
          Write-Host "Is latest release: $isLatest"
          Write-Host "Update existing: $updateExisting"

      - name: Create or update release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tagName = "${{ steps.meta.outputs.tag_name }}"
          $isBeta = "${{ steps.meta.outputs.is_beta }}" -eq 'true'
          $updateExisting = "${{ steps.meta.outputs.update_existing }}" -eq 'true'
          $isLatest = "${{ steps.meta.outputs.is_latest }}" -eq 'true'

          $args = @()
          if ($isBeta) { $args += '--prerelease' }
          if ($isLatest -and -not $isBeta) { $args += '--latest' } else { $args += '--latest=false' }
          $args += '--generate-notes'

          if ($updateExisting) {
            # Update existing release: move the tag, then edit the release
            git tag -f $tagName ${{ github.sha }}
            git push origin $tagName --force
            gh release edit $tagName --title $tagName @args
          } else {
            gh release create $tagName --title $tagName --target ${{ github.sha }} @args
          }

      - name: Update preview tag
        if: steps.meta.outputs.is_latest == 'true' && steps.meta.outputs.is_beta == 'true'
        shell: pwsh
        run: |
          git tag -f preview ${{ github.sha }}
          git push origin preview --force

      - name: Update latest tag
        if: steps.meta.outputs.is_latest == 'true' && steps.meta.outputs.is_beta != 'true'
        shell: pwsh
        run: |
          git tag -f latest ${{ github.sha }}
          git push origin latest --force
