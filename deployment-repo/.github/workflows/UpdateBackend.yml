# ============================================================================
# Update Backend – Caller workflow for the Fkh reusable workflow
# ============================================================================
# Publishes Azure Function code changes without running Terraform.
# Calls the reusable UpdateFkhBackEnd workflow in your Fkh fork.
#
# ── Optional Inputs ─────────────────────────────────────────────────────────
#   fkh-repo    - Owner/name of the Fkh fork (e.g. Freddy-DK/Fkh) (default: Freddy-DK/Fkh)
#   fkh-ref     - Git ref to checkout from the Fkh fork (e.g. main, a branch name, a tag or a commit SHA) (default: main)
#
# ── Required GitHub Secrets ─────────────────────────────────────────────────
#   AZURE_DEPLOY_CLIENT_ID        - Client ID of the deployment identity
#
# ============================================================================

name: Update Backend

on:
  workflow_dispatch:

jobs:
  update:
    uses: Freddy-DK/Fkh/.github/workflows/UpdateFkhBackEnd.yml@main
    permissions:
      id-token: write
      contents: read
    secrets:
      AZURE_DEPLOY_CLIENT_ID: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
