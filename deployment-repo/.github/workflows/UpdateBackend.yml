# ============================================================================
# Update Backend – Caller workflow for the Fkh reusable workflow
# ============================================================================
# Publishes Azure Function code changes without running Terraform.
# Calls the reusable UpdateFkhBackEnd workflow in your Fkh fork.
#
# The fkh-repo and fkh-ref values below are kept in sync with the uses: line.
# Use the CLI commands CreateDeploymentRepo / UpdateDeploymentRepo to change
# the target fork and branch — they update all three values together.
#
# ── Required GitHub Secrets ─────────────────────────────────────────────────
#   (none)
#
# The deployment identity client ID (azure_deploy_client_id) is read from
# config/deployment.tfvars — it is not a secret.
#
# ============================================================================

name: Update Backend

on:
  workflow_dispatch:
    inputs:
      staging:
        description: 'Deploy to the staging Function App only (default: false)'
        required: false
        type: boolean
        default: false

jobs:
  update:
    uses: Freddy-DK/Fkh/.github/workflows/UpdateFkhBackEnd.yml@main
    permissions:
      id-token: write
      contents: read
    with:
      fkh-repo: Freddy-DK/Fkh
      fkh-ref: main
      staging: ${{ inputs.staging }}
