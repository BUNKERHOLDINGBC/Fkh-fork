# ============================================================================
# Deploy Full Stack – Caller workflow for the Fkh reusable workflow
# ============================================================================
# This workflow calls the reusable DeployFkhFullStack workflow in your Fkh fork.
# It passes your deployment.tfvars (from this repo) and secrets to the
# reusable workflow, which handles all Terraform and function publishing.
#
# The fkh-repo and fkh-ref values below are kept in sync with the uses: line.
# Use the CLI commands CreateDeploymentRepo / UpdateDeploymentRepo to change
# the target fork and branch — they update all three values together.
#
# ── Required GitHub Secrets ─────────────────────────────────────────────────
#   SQL_SA_PASSWORD                - SA password for the SQL Server in AKS
#   GH_APP_PRIVATE_KEY             - PEM-encoded private key of the GitHub App
#
# The deployment identity client ID (azure_deploy_client_id) is read from
# config/deployment.tfvars — it is not a secret.
#
# ============================================================================

name: Deploy Full Stack

on:
  workflow_dispatch:
    inputs:
      resilient-apply:
        description: 'Auto-import resources that already exist in Azure (handles manual changes / state drift)'
        type: boolean
        default: false

jobs:
  deploy:
    uses: Freddy-DK/Fkh/.github/workflows/DeployFkhFullStack.yml@main
    permissions:
      id-token: write
      contents: read
    with:
      fkh-repo: Freddy-DK/Fkh
      fkh-ref: main
      resilient-apply: ${{ inputs.resilient-apply }}
    secrets:
      SQL_SA_PASSWORD: ${{ secrets.SQL_SA_PASSWORD }}
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
